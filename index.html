<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Royal Checkers · Ultimate Fullscreen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap');

:root {
  --bg-deep:   #0d0d1a;
  --bg-panel:  #131325;
  --bg-card:   #1a1a30;
  --border:    #2e2e55;
  --gold:      #c9a227;
  --gold-dim:  #8a6f1a;
  --cell-dark: #2a3d1e;
  --cell-lite: #e8d5b0;
  --text:      #ddd;
  --text-dim:  #888;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  transition: all 0.2s;
}

/* Fullscreen handling */
body:fullscreen,
body:-webkit-full-screen {
  padding: 16px;
  background: #0a0a12;
}

#app {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 20px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 20px;
}
#title {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
}
#title span {
  color: #fff;
  opacity: .6;
  font-weight: 400;
  font-size: 0.85rem;
  margin-left: 4px;
}
#hdr-btns {
  display: flex;
  gap: 6px;
}

/* UI Buttons */
.btn {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  background: rgba(20, 20, 40, 0.85);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 14px;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s ease;
  touch-action: manipulation;
  min-height: 40px;
}
.btn:active { transform: scale(0.96); }
.btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201, 162, 39, 0.2);
}
.btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #111;
  font-weight: 700;
}
.btn.sm {
  font-size: 11px;
  padding: 4px 8px;
  min-height: 32px;
}
.btn.danger:active { border-color: #e74c3c; color: #e74c3c; }
.btn-group {
  display: flex;
  gap: 6px;
}
.btn-group .btn {
  flex: 1;
  text-align: center;
  padding: 4px 6px;
  font-size: 11px;
}

/* Scores */
#scores {
  display: flex;
  gap: 12px;
}
.score-card {
  flex: 1;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px;
  text-align: center;
}
.score-card .sc-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.score-card .sc-val {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--gold);
  font-weight: 600;
}

/* Main Layout: Desktop split */
#main {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  width: 100%;
}

/* Board Responsiveness Architecture */
#board-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 650px; /* Limits size on ultra-wide screens */
  margin: 0 auto;
}
#board-outer {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: center;
}
#board-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1; /* Keeps the game grid perfectly square */
}
#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  width: 100%;
  height: 100%;
  border: 3px solid var(--gold-dim);
  border-radius: 8px;
  overflow: hidden;
  background: #1f2a15;
}

/* Dynamic Coordinate Labels mapping the grid spacing */
#coord-row-top, #coord-row-bot {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: 100%;
  padding: 0 4%; /* Matches side column alignment offset */
  margin: 4px 0;
}
.coord-col {
  display: grid;
  grid-template-rows: repeat(8, 1fr);
  height: 100%;
  width: 4%;
  min-width: 14px;
  text-align: center;
}
.coord-label {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold-dim);
  font-family: 'Cinzel', serif;
}
.coord-col span {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold-dim);
}

/* Game Pieces & Interactions */
.cell {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  touch-action: manipulation;
}
.cell.lite { background: var(--cell-lite); }
.cell.dark { background: var(--cell-dark); }
.cell.dark:active { background: #3c552b; }
.cell.sel-cell {
  background: rgba(201, 162, 39, 0.7) !important;
  outline: 2px solid rgba(201, 162, 39, 0.95);
  z-index: 2;
}
.cell.move-dot::after {
  content: '';
  width: 25%;
  height: 25%;
  border-radius: 50%;
  background: rgba(46, 204, 113, 0.9);
  box-shadow: 0 0 6px rgba(0,0,0,0.4);
}
.cell.cap-dot {
  background: rgba(231, 76, 60, 0.55) !important;
  outline: 2px solid #e74c3c;
}
.cell.last-from { background: rgba(201, 162, 39, 0.35) !important; }
.cell.last-to { background: rgba(201, 162, 39, 0.5) !important; }

.piece {
  width: 82%;
  height: 82%;
  border-radius: 50%;
  position: relative;
  cursor: pointer;
  transition: transform 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.piece.red {
  background: radial-gradient(circle at 38% 32%, #f05545, #c0392b 70%, #7a1f16);
  border: 1px solid rgba(255, 120, 100, 0.6);
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
}
.piece.blk {
  background: radial-gradient(circle at 38% 32%, #5a5a7a, #2c2c3e 70%, #111118);
  border: 1px solid rgba(130, 130, 180, 0.5);
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.6);
}
.piece.king::after {
  content: '♛';
  font-size: clamp(14px, 4.5vw, 24px);
  color: #ffd966;
  text-shadow: 0 0 6px rgba(255, 215, 0, 0.9);
  position: absolute;
}
.piece.lifted {
  transform: scale(1.1);
  box-shadow: 0 0 0 2px var(--gold), 0 6px 14px rgba(0, 0, 0, 0.6) !important;
}

/* Modals & Overlays */
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(5, 5, 15, 0.9);
  display: none;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  z-index: 30;
  backdrop-filter: blur(4px);
}
#overlay-box {
  background: var(--bg-card);
  border: 1px solid var(--gold);
  border-radius: 24px;
  padding: 24px;
  text-align: center;
  max-width: 260px;
  width: 85%;
}
#overlay-box h2 { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold); margin-bottom: 8px; }
#overlay-box p { font-size: 14px; color: #ccc; margin-bottom: 20px; }

/* Sidebar Panels */
#sidebar {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 280px;
  flex-shrink: 0;
}
.panel {
  background: rgba(19, 19, 37, 0.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 14px;
}
.panel h3 {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--gold-dim);
  margin-bottom: 8px;
}
.player-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid transparent;
  margin-bottom: 4px;
}
.player-row.active {
  background: rgba(201, 162, 39, 0.12);
  border-color: rgba(201, 162, 39, 0.4);
}
.pdot { width: 16px; height: 16px; border-radius: 50%; }
.pdot.red { background: #c0392b; }
.pdot.blk { background: #2c2c3e; border: 1px solid #5a5a7a; }
.pname { font-size: 14px; font-weight: 500; flex: 1; }
.pcnt {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  background: rgba(201, 162, 39, 0.15);
  border-radius: 20px;
  padding: 2px 8px;
}
.timer {
  font-family: monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dim);
}
.timer.on { color: var(--gold); }
.timer.low { color: #e74c3c !important; }
#history {
  max-height: 100px;
  overflow-y: auto;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}
#history div { padding: 2px 4px; }
#status-msg { font-size: 13px; color: #ddd; }
#status-msg.thinking { color: var(--gold-dim); font-style: italic; }

/* ==================== SCREEN BREAKPOINTS ==================== */

/* Tablets and small laptops (e.g. iPad, smaller notebooks) */
@media (max-width: 960px) {
  #app { max-width: 700px; }
  #main { flex-direction: column; align-items: center; }
  #sidebar { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .panel { height: 100%; }
}

/* Mobile Phones (Horizontal & Vertical adjustments) */
@media (max-width: 600px) {
  body { padding: 8px; }
  #header { padding: 10px 14px; border-radius: 14px; }
  #title { font-size: 1.1rem; }
  #title span { display: none; }
  .btn { font-size: 11px; padding: 6px 10px; min-height: 36px; }
  
  #board-container { padding: 8px; border-radius: 14px; }
  .coord-label, .coord-col span { font-size: 10px; }
  
  #sidebar { grid-template-columns: 1fr; gap: 10px; }
  .score-card { padding: 6px; }
  .score-card .sc-val { font-size: 16px; }
}

/* Ultra small devices */
@media (max-width: 360px) {
  #hdr-btns { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; }
  #hdr-btns .btn { font-size: 9px; padding: 4px; min-height: 32px; }
  #header { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="title">CHECKERS <span>ROYAL</span></div>
    <div id="hdr-btns">
      <button class="btn" id="fullscreenBtn" title="Fullscreen">⛶ Full</button>
      <button class="btn" onclick="newGame()">⟳ New</button>
      <button class="btn" onclick="undoMove()">↩ Undo</button>
      <button class="btn" onclick="redoMove()">↪ Redo</button>
      <button class="btn danger" onclick="resign()">⚑ Resign</button>
    </div>
  </div>

  <div id="scores">
    <div class="score-card"><div class="sc-label">Red Wins</div><div class="sc-val" id="sc-red">0</div></div>
    <div class="score-card"><div class="sc-label">Draws</div><div class="sc-val" id="sc-draw">0</div></div>
    <div class="score-card"><div class="sc-label">Black Wins</div><div class="sc-val" id="sc-blk">0</div></div>
  </div>

  <div id="main">
    <div id="board-container">
      <div id="coord-row-top">
        <div class="coord-label">a</div><div class="coord-label">b</div><div class="coord-label">c</div><div class="coord-label">d</div>
        <div class="coord-label">e</div><div class="coord-label">f</div><div class="coord-label">g</div><div class="coord-label">h</div>
      </div>
      <div id="board-outer">
        <div class="coord-col" id="cleft"></div>
        <div id="board-wrap">
          <div id="board"></div>
          <div id="overlay">
            <div id="overlay-box">
              <h2 id="ov-title">Game Over</h2>
              <p id="ov-msg"></p>
              <button class="btn active" onclick="newGame()">Play Again</button>
            </div>
          </div>
        </div>
        <div class="coord-col" id="cright"></div>
      </div>
      <div id="coord-row-bot">
        <div class="coord-label">a</div><div class="coord-label">b</div><div class="coord-label">c</div><div class="coord-label">d</div>
        <div class="coord-label">e</div><div class="coord-label">f</div><div class="coord-label">g</div><div class="coord-label">h</div>
      </div>
    </div>

    <div id="sidebar">
      <div class="panel">
        <h3>Players</h3>
        <div class="player-row" id="row-red">
          <div class="pdot red"></div>
          <div class="pname">Red</div>
          <div class="pcnt" id="cnt-red">12</div>
          <div class="timer" id="tmr-red">5:00</div>
        </div>
        <div class="player-row" id="row-blk">
          <div class="pdot blk"></div>
          <div class="pname" id="blk-name">Black (AI)</div>
          <div class="pcnt" id="cnt-blk">12</div>
          <div class="timer" id="tmr-blk">5:00</div>
        </div>
      </div>
      <div class="panel">
        <h3>Game Mode</h3>
        <div class="btn-group">
          <button class="btn active" id="m-pvai" onclick="setMode('pvai')">vs AI</button>
          <button class="btn" id="m-pvp" onclick="setMode('pvp')">2 Player</button>
        </div>
      </div>
      <div class="panel" id="diff-panel">
        <h3>AI Difficulty</h3>
        <div class="btn-group">
          <button class="btn sm" id="d-easy" onclick="setDiff('easy')">Easy</button>
          <button class="btn sm active" id="d-medium" onclick="setDiff('medium')">Med</button>
          <button class="btn sm" id="d-hard" onclick="setDiff('hard')">Hard</button>
        </div>
      </div>
      <div class="panel">
        <h3>Status & History</h3>
        <div id="status-msg" style="margin-bottom: 6px;">Your turn (Red)</div>
        <div id="history"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Keep your existing JS exactly as it was. No changes are required here 
// because the responsive CSS values take absolute control over sizes.
var E=0, R=1, B=2, RK=3, BK=4;
var board, sel, selMoves, turn, gOver, gMode, diff;
var chainPiece, lastMove, hist, histIdx, moveLog, tRed, tBlk, tInt, scores, aiLock, kpopSet;

const fullscreenBtn = document.getElementById('fullscreenBtn');
function launchFullscreen(element) {
  const requestMethod = element.requestFullscreen || element.webkitRequestFullscreen || element.webkitEnterFullscreen || element.msRequestFullscreen;
  if (requestMethod) requestMethod.call(element).catch(err => console.warn(err));
}
function exitFullscreen() {
  const exitMethod = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if (exitMethod) exitMethod.call(document);
}
function toggleFullscreen() {
  const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
  if (!isFull) launchFullscreen(document.documentElement);
  else exitFullscreen();
}
fullscreenBtn.addEventListener('click', (e) => { e.preventDefault(); toggleFullscreen(); });
fullscreenBtn.addEventListener('touchstart', (e) => { e.preventDefault(); toggleFullscreen(); }, { passive: false });

function isR(p){ return p===R||p===RK; }
function isB(p){ return p===B||p===BK; }
function isK(p){ return p===RK||p===BK; }
function own(p,t){ return t===R ? isR(p) : isB(p); }
function opp(t){ return t===R ? B : R; }
function dirs(p){
  if(p===R) return [[-1,-1],[-1,1]];
  if(p===B) return [[1,-1],[1,1]];
  return [[-1,-1],[-1,1],[1,-1],[1,1]];
}
function capsFor(b, r, c){
  var p=b[r][c], res=[], dd=dirs(p);
  for(var i=0;i<dd.length;i++){
    var dr=dd[i][0], dc=dd[i][1], mr=r+dr, mc=c+dc, lr=r+2*dr, lc=c+2*dc;
    if(lr<0||lr>7||lc<0||lc>7) continue;
    var mid=b[mr][mc];
    if(b[lr][lc]!==E) continue;
    if(isR(p)&&isB(mid)) res.push({fr:r,fc:c,tr:lr,tc:lc,mr,mc});
    if(isB(p)&&isR(mid)) res.push({fr:r,fc:c,tr:lr,tc:lc,mr,mc});
  }
  return res;
}
function simpFor(b,r,c){
  var p=b[r][c], res=[], dd=dirs(p);
  for(var i=0;i<dd.length;i++){
    var nr=r+dd[i][0], nc=c+dd[i][1];
    if(nr>=0&&nr<=7&&nc>=0&&nc<=7&&b[nr][nc]===E) res.push({fr:r,fc:c,tr:nr,tc:nc,mr:-1,mc:-1});
  }
  return res;
}
function legalMoves(b,t){
  var caps=[], simps=[];
  for(var r=0;r<8;r++) for(var c=0;c<8;c++) if(own(b[r][c],t)){
    caps.push(...capsFor(b,r,c));
    simps.push(...simpFor(b,r,c));
  }
  return caps.length ? caps : simps;
}
function legalForPiece(b,r,c,t){
  var anyCap=false;
  for(var rr=0;rr<8;rr++) for(var cc=0;cc<8;cc++) if(own(b[rr][cc],t) && capsFor(b,rr,cc).length) anyCap=true;
  if(anyCap) return capsFor(b,r,c);
  return simpFor(b,r,c);
}
function applyMove(b,mv){
  var nb=b.map(row=>row.slice()), piece=nb[mv.fr][mv.fc];
  nb[mv.fr][mv.fc]=E;
  if(mv.mr>=0) nb[mv.mr][mv.mc]=E;
  nb[mv.tr][mv.tc]=piece;
  if(piece===R && mv.tr===0) nb[mv.tr][mv.tc]=RK;
  if(piece===B && mv.tr===7) nb[mv.tr][mv.tc]=BK;
  return nb;
}
function promoted(before,mv){ var p=before[mv.fr][mv.fc]; return (p===R&&mv.tr===0)||(p===B&&mv.tr===7); }
function count(b){ let r=0,bk=0; for(let i=0;i<8;i++) for(let j=0;j<8;j++){ if(isR(b[i][j])) r++; else if(isB(b[i][j])) bk++; } return {r,bk}; }
function evaluate(b){ let s=0; for(let r=0;r<8;r++)for(let c=0;c<8;c++){ let p=b[r][c]; if(p===E)continue; let center=Math.min(r,7-r,c,7-c); if(p===R)s-=(1+(7-r)*0.07+center*0.05); else if(p===B)s+=(1+r*0.07+center*0.05); else if(p===RK)s-=1.7; else if(p===BK)s+=1.7; } return s; }
function minimax(b,depth,a,beta,maxi,t){
  let moves=legalMoves(b,t); if(depth===0||!moves.length) return evaluate(b);
  if(maxi){ let best=-Infinity; for(let mv of moves){ let nb=applyMove(b,mv); let val=(mv.mr>=0&&!promoted(b,mv)&&capsFor(nb,mv.tr,mv.tc).length)?minimax(nb,depth,a,beta,true,t):minimax(nb,depth-1,a,beta,false,opp(t)); best=Math.max(best,val); a=Math.max(a,val); if(beta<=a) break; } return best; }
  else{ let best=Infinity; for(let mv of moves){ let nb=applyMove(b,mv); let val=(mv.mr>=0&&!promoted(b,mv)&&capsFor(nb,mv.tr,mv.tc).length)?minimax(nb,depth,a,beta,false,t):minimax(nb,depth-1,a,beta,true,opp(t)); best=Math.min(best,val); beta=Math.min(beta,val); if(beta<=a) break; } return best; }
}
function bestMove(b,t){
  let depthMap={easy:1,medium:4,hard:7}, depth=depthMap[diff]||4, moves=legalMoves(b,t); if(!moves.length) return null;
  if(diff==='easy'){ let caps=moves.filter(m=>m.mr>=0), pool=caps.length?caps:moves; return pool[Math.floor(Math.random()*pool.length)]; }
  let best=null, bestVal=(t===B)?-Infinity:Infinity;
  for(let mv of moves){ let nb=applyMove(b,mv); let val=(mv.mr>=0&&!promoted(b,mv)&&capsFor(nb,mv.tr,mv.tc).length)?minimax(nb,depth,-Infinity,Infinity,(t===B),t):minimax(nb,depth-1,-Infinity,Infinity,(t===R),opp(t)); if(t===B && val>bestVal){bestVal=val;best=mv;} if(t===R && val<bestVal){bestVal=val;best=mv;} }
  return best||moves[0];
}
function bestChainCap(b,r,c,t){ let caps=capsFor(b,r,c); if(!caps.length) return null; if(diff==='easy') return caps[0]; let best=null, bestVal=(t===B)?-Infinity:Infinity; for(let mv of caps){ let nb=applyMove(b,mv); let val=minimax(nb,Math.max(1,(diff==='hard'?5:3)-1),-Infinity,Infinity,(t===R),opp(t)); if(t===B && val>bestVal){bestVal=val;best=mv;} if(t===R && val<bestVal){bestVal=val;best=mv;} } return best||caps[0]; }

function render(){
  let bd=document.getElementById('board'); bd.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    let cell=document.createElement('div'); cell.className='cell '+((r+c)%2===0?'lite':'dark');
    if(lastMove){ if(lastMove.fr===r&&lastMove.fc===c) cell.classList.add('last-from'); if(lastMove.tr===r&&lastMove.tc===c) cell.classList.add('last-to'); }
    if(sel&&sel[0]===r&&sel[1]===c) cell.classList.add('sel-cell');
    if(selMoves) for(let m of selMoves) if(m.tr===r&&m.tc===c){ cell.classList.add(m.mr>=0?'cap-dot':'move-dot'); break; }
    cell.dataset.r=r; cell.dataset.c=c; cell.onclick=()=>handleClick(r,c);
    let p=board[r][c];
    if(p!==E){
      let pc=document.createElement('div'); pc.className='piece '+(isR(p)?'red':'blk')+(isK(p)?' king':'');
      if(sel&&sel[0]===r&&sel[1]===c) pc.classList.add('lifted');
      if(kpopSet&&kpopSet.has(r*8+c)) pc.classList.add('kpop');
      cell.appendChild(pc);
    }
    bd.appendChild(cell);
  }
  kpopSet=null;
  let cnt=count(board);
  document.getElementById('cnt-red').textContent=cnt.r;
  document.getElementById('cnt-blk').textContent=cnt.bk;
  document.getElementById('row-red').classList.toggle('active',turn===R&&!gOver);
  document.getElementById('row-blk').classList.toggle('active',turn===B&&!gOver);
  document.getElementById('tmr-red').classList.toggle('on',turn===R&&!gOver);
  document.getElementById('tmr-blk').classList.toggle('on',turn===B&&!gOver);
}
function handleClick(r,c){ if(gOver||aiLock) return; if(gMode==='pvai'&&turn===B) return; let p=board[r][c]; if(chainPiece){ let caps=capsFor(board,chainPiece[0],chainPiece[1]); for(let mv of caps) if(mv.tr===r&&mv.tc===c){ doMove(mv); return; } return; } if(sel){ let mv=null; for(let m of selMoves) if(m.tr===r&&m.tc===c){ mv=m; break; } if(mv){ doMove(mv); return; } if(own(p,turn)){ sel=[r,c]; selMoves=legalForPiece(board,r,c,turn); render(); return; } sel=null; selMoves=null; render(); return; } if(own(p,turn)){ sel=[r,c]; selMoves=legalForPiece(board,r,c,turn); render(); } }
function doMove(mv){ let wasPromo=promoted(board,mv); saveHist(); board=applyMove(board,mv); lastMove=mv; if(wasPromo){ kpopSet=kpopSet||new Set(); kpopSet.add(mv.tr*8+mv.tc); } let canChain=mv.mr>=0&&!wasPromo&&capsFor(board,mv.tr,mv.tc).length>0; if(canChain){ chainPiece=[mv.tr,mv.tc]; sel=[mv.tr,mv.tc]; selMoves=capsFor(board,mv.tr,mv.tc); render(); updateStatus(); if(gMode==='pvai'&&turn===B) scheduleAI(380); return; } chainPiece=null; sel=null; selMoves=null; logMove(mv,turn); turn=opp(turn); render(); checkEnd(); updateStatus(); if(!gOver&&gMode==='pvai'&&turn===B) scheduleAI(500); }
function scheduleAI(d){ if(aiLock) return; aiLock=true; updateStatus(); setTimeout(()=>{ if(gOver){ aiLock=false; return; } let mv=chainPiece?bestChainCap(board,chainPiece[0],chainPiece[1],B):bestMove(board,B); aiLock=false; if(mv) doMove(mv); }, d); }
function checkEnd(){ let cnt=count(board); if(cnt.r===0){ endGame('Black Wins!','Red has no pieces left.','b'); return; } if(cnt.bk===0){ endGame('Red Wins!','Black has no pieces left.','r'); return; } if(legalMoves(board,turn).length===0){ let w=turn===R?'Black':'Red'; endGame(w+' Wins!',w==='Red'?'Black has no moves.':'Red has no moves.',turn===R?'b':'r'); } }
function endGame(t,m,w){ gOver=true; if(w==='r') scores.r++; else if(w==='b') scores.b++; else scores.d++; document.getElementById('sc-red').textContent=scores.r; document.getElementById('sc-blk').textContent=scores.b; document.getElementById('sc-draw').textContent=scores.d; let ot=document.getElementById('ov-title'); ot.textContent=t; ot.className='won'; document.getElementById('ov-msg').textContent=m; document.getElementById('overlay').style.display='flex'; if(tInt) clearInterval(tInt); }
function resign(){ if(gOver) return; let w=turn===R?'b':'r'; endGame((w==='r'?'Red':'Black')+' Wins!','Opponent resigned.',w); }
function saveHist(){ hist=hist.slice(0,histIdx+1); hist.push({board:board.map(r=>r.slice()),turn,chain:chainPiece?chainPiece.slice():null,last:lastMove?{...lastMove}:null,logLen:moveLog.length}); histIdx=hist.length-1; }
function restoreSnap(s){ board=s.board.map(r=>r.slice()); turn=s.turn; chainPiece=s.chain?s.chain.slice():null; lastMove=s.last?{...s.last}:null; sel=null; selMoves=null; moveLog=moveLog.slice(0,s.logLen); refreshHistoryPanel(); gOver=false; document.getElementById('overlay').style.display='none'; render(); updateStatus(); }
function undoMove(){ if(aiLock) return; let steps=gMode==='pvai'?2:1; let target=histIdx-steps; if(target<0) target=0; if(target===histIdx) return; histIdx=target; restoreSnap(hist[histIdx]); }
function redoMove(){ if(histIdx>=hist.length-1) return; histIdx++; restoreSnap(hist[histIdx]); }
const COLS='abcdefgh'; function logMove(mv,t){ let from=COLS[mv.fc]+(8-mv.fr), to=COLS[mv.tc]+(8-mv.tr), txt=(t===R?'Red':'Black')+': '+from+(mv.mr>=0?'×':'-')+to; moveLog.push({txt,cap:mv.mr>=0}); refreshHistoryPanel(); }
function refreshHistoryPanel(){ let h=document.getElementById('history'); h.innerHTML=''; for(let i=0;i<moveLog.length;i++){ let d=document.createElement('div'); d.textContent=(i+1)+'. '+moveLog[i].txt; if(moveLog[i].cap) d.classList.add('cap'); h.appendChild(d); } h.scrollTop=h.scrollHeight; }
function updateStatus(){ let el=document.getElementById('status-msg'); if(gOver){ el.textContent='Game over.'; el.className=''; return; } if(aiLock){ el.textContent='AI is thinking...'; el.className='thinking'; return; } if(chainPiece){ el.textContent='Continue capturing!'; el.className='chain'; return; } if(gMode==='pvai') el.textContent=turn===R?'Your turn (Red)':'AI is moving...'; else el.textContent=(turn===R?'Red':'Black')+' to move'; el.className=''; }
function fmtTime(s){ let m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
function updateTimers(){ document.getElementById('tmr-red').textContent=fmtTime(tRed); document.getElementById('tmr-blk').textContent=fmtTime(tBlk); document.getElementById('tmr-red').classList.toggle('low',tRed<30&&!gOver); document.getElementById('tmr-blk').classList.toggle('low',tBlk<30&&!gOver); }
function tickTimer(){ if(gOver||aiLock) return; if(turn===R) tRed=Math.max(0,tRed-1); else tBlk=Math.max(0,tBlk-1); if(tRed===0) endGame('Black Wins!','Red ran out of time.','b'); if(tBlk===0) endGame('Red Wins!','Black ran out of time.','r'); updateTimers(); }
function setMode(m){ gMode=m; document.getElementById('m-pvai').classList.toggle('active',m==='pvai'); document.getElementById('m-pvp').classList.toggle('active',m==='pvp'); document.getElementById('diff-panel').style.display=m==='pvai'?'':'none'; document.getElementById('blk-name').textContent=m==='pvai'?'Black (AI)':'Black'; newGame(); }
function setDiff(d){ diff=d; ['easy','medium','hard'].forEach(x=>document.getElementById('d-'+x).classList.remove('active')); document.getElementById('d-'+d).classList.add('active'); }
function initBoard(){ board=Array(8).fill().map(()=>Array(8).fill(E)); for(let r=0;r<3;r++) for(let c=0;c<8;c++) if((r+c)%2===1) board[r][c]=B; for(let r=5;r<8;r++) for(let c=0;c<8;c++) if((r+c)%2===1) board[r][c]=R; }
function buildCoords(){ let L=document.getElementById('cleft'), Rr=document.getElementById('cright'); L.innerHTML=Rr.innerHTML=''; for(let i=8;i>=1;i--){ let sl=document.createElement('span'); sl.textContent=i; L.appendChild(sl); let sr=document.createElement('span'); sr.textContent=i; Rr.appendChild(sr); } }
function newGame(){ if(tInt) clearInterval(tInt); if(!scores) scores={r:0,b:0,d:0}; if(!diff) diff='medium'; if(!gMode) gMode='pvai'; initBoard(); sel=null; selMoves=null; turn=R; gOver=false; chainPiece=null; lastMove=null; aiLock=false; kpopSet=null; hist=[]; histIdx=-1; moveLog=[]; tRed=300; tBlk=300; document.getElementById('overlay').style.display='none'; document.getElementById('ov-title').className=''; refreshHistoryPanel(); buildCoords(); saveHist(); render(); updateStatus(); updateTimers(); tInt=setInterval(tickTimer,1000); }
newGame();
</script>
</body>
