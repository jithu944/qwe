<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<title>Royal Checkers Mobile Fixed</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap');

:root{
  --bg-deep:#0d0d1a;
  --bg-panel:#131325;
  --bg-card:#1a1a30;
  --border:#2e2e55;
  --gold:#c9a227;
  --gold-dim:#8a6f1a;
  --cell-dark:#2a3d1e;
  --cell-lite:#e8d5b0;
  --text:#ddd;
  --text-dim:#888;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg-deep);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow-x:hidden;
  padding:8px;
}

/* APP */
#app{
  width:100%;
  max-width:1200px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* HEADER */
#header{
  width:100%;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

#title{
  font-family:'Cinzel',serif;
  font-size:1.4rem;
  color:var(--gold);
  font-weight:700;
}

#title span{
  opacity:.6;
  color:#fff;
  font-size:.8rem;
}

#hdr-btns{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.btn{
  border:none;
  outline:none;
  cursor:pointer;
  border-radius:40px;
  background:#1f1f35;
  color:#ccc;
  padding:10px 14px;
  font-size:12px;
  font-weight:600;
  border:1px solid var(--border);
  min-height:40px;
}

.btn:hover{
  color:var(--gold);
  border-color:var(--gold);
}

.btn.active{
  background:var(--gold);
  color:#111;
}

.btn-group{
  display:flex;
  gap:6px;
}

.btn.sm{
  padding:6px 10px;
  font-size:11px;
}

/* SCORES */
#scores{
  display:flex;
  gap:10px;
  width:100%;
}

.score-card{
  flex:1;
  background:var(--bg-panel);
  border-radius:16px;
  border:1px solid var(--border);
  padding:10px;
  text-align:center;
}

.sc-label{
  font-size:11px;
  color:var(--text-dim);
}

.sc-val{
  font-size:20px;
  color:var(--gold);
  font-family:'Cinzel',serif;
}

/* MAIN */
#main{
  display:flex;
  gap:16px;
  width:100%;
  align-items:flex-start;
}

/* BOARD */
#board-container{
  flex:1;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
}

#board-outer{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:4px;
  overflow:hidden;
}

.coord-col{
  width:18px;
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}

.coord-col span{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:10px;
  color:var(--gold-dim);
}

#coord-row-top,
#coord-row-bot{
  width:min(94vw,540px);
  display:flex;
  justify-content:space-around;
  margin:4px 0;
}

.coord-label{
  font-size:10px;
  color:var(--gold-dim);
  flex:1;
  text-align:center;
}

/* BOARD FIX */
#board-wrap{
  position:relative;
}

#board{
  width:min(94vw,540px);
  height:min(94vw,540px);

  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);

  border:3px solid var(--gold-dim);
  border-radius:12px;
  overflow:hidden;
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
}

.cell.lite{
  background:var(--cell-lite);
}

.cell.dark{
  background:var(--cell-dark);
}

.cell.sel-cell{
  background:#c9a227 !important;
}

.cell.move-dot::after{
  content:'';
  width:25%;
  height:25%;
  border-radius:50%;
  background:#2ecc71;
}

.cell.cap-dot{
  background:#a82b2b !important;
}

/* PIECES */
.piece{
  width:80%;
  height:80%;
  border-radius:50%;
  position:relative;
}

.red{
  background:radial-gradient(circle at 35% 35%, #f05545, #7a1f16);
}

.blk{
  background:radial-gradient(circle at 35% 35%, #5a5a7a, #111118);
}

.king::after{
  content:'♛';
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:gold;
  font-size:clamp(12px,3vw,24px);
}

/* OVERLAY */
#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
}

#overlay-box{
  background:var(--bg-card);
  border:1px solid var(--gold);
  padding:24px;
  border-radius:24px;
  text-align:center;
}

#overlay-box h2{
  color:var(--gold);
  margin-bottom:10px;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.panel{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
}

.panel h3{
  font-size:12px;
  color:var(--gold-dim);
  margin-bottom:10px;
}

.player-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.pdot{
  width:18px;
  height:18px;
  border-radius:50%;
}

.pdot.red{
  background:#d93b3b;
}

.pdot.blk{
  background:#444;
}

.pname{
  flex:1;
}

.timer{
  font-family:monospace;
}

#history{
  max-height:140px;
  overflow:auto;
  font-size:12px;
}

/* MOBILE FIX */
@media(max-width:900px){

  #main{
    flex-direction:column;
    align-items:center;
  }

  #sidebar{
    width:100%;
  }

}

@media(max-width:600px){

  body{
    padding:4px;
  }

  #header{
    flex-direction:column;
    align-items:stretch;
  }

  #hdr-btns{
    justify-content:center;
  }

  #board{
    width:96vw;
    height:96vw;
  }

  #coord-row-top,
  #coord-row-bot{
    width:96vw;
  }

  #scores{
    gap:6px;
  }

  .score-card{
    padding:8px;
  }

  .sc-val{
    font-size:16px;
  }

  .btn{
    font-size:10px;
    padding:8px 10px;
  }

  #title{
    text-align:center;
    font-size:1.1rem;
  }

  .coord-col{
    width:14px;
  }

  .coord-col span{
    font-size:8px;
  }

  .coord-label{
    font-size:8px;
  }

  .panel{
    padding:10px;
  }

}

/* FULLSCREEN MOBILE FIX */
body:fullscreen #board,
body:-webkit-full-screen #board{
  width:min(95vw,95vh);
  height:min(95vw,95vh);
}
</style>
</head>

<body>

<div id="app">

  <div id="header">
    <div id="title">CHECKERS <span>ROYAL</span></div>

    <div id="hdr-btns">
      <button class="btn" id="fullscreenBtn">⛶ Fullscreen</button>
      <button class="btn">⟳ New</button>
      <button class="btn">↩ Undo</button>
      <button class="btn">↪ Redo</button>
      <button class="btn">⚑ Resign</button>
    </div>
  </div>

  <div id="scores">
    <div class="score-card">
      <div class="sc-label">Red Wins</div>
      <div class="sc-val">0</div>
    </div>

    <div class="score-card">
      <div class="sc-label">Draws</div>
      <div class="sc-val">0</div>
    </div>

    <div class="score-card">
      <div class="sc-label">Black Wins</div>
      <div class="sc-val">0</div>
    </div>
  </div>

  <div id="main">

    <div id="board-container">

      <div id="coord-row-top">
        <div class="coord-label">a</div>
        <div class="coord-label">b</div>
        <div class="coord-label">c</div>
        <div class="coord-label">d</div>
        <div class="coord-label">e</div>
        <div class="coord-label">f</div>
        <div class="coord-label">g</div>
        <div class="coord-label">h</div>
      </div>

      <div id="board-outer">

        <div class="coord-col">
          <span>8</span>
          <span>7</span>
          <span>6</span>
          <span>5</span>
          <span>4</span>
          <span>3</span>
          <span>2</span>
          <span>1</span>
        </div>

        <div id="board-wrap">

          <div id="board"></div>

          <div id="overlay">
            <div id="overlay-box">
              <h2>Game Over</h2>
              <p>Winner</p>
            </div>
          </div>

        </div>

        <div class="coord-col">
          <span>8</span>
          <span>7</span>
          <span>6</span>
          <span>5</span>
          <span>4</span>
          <span>3</span>
          <span>2</span>
          <span>1</span>
        </div>

      </div>

      <div id="coord-row-bot">
        <div class="coord-label">a</div>
        <div class="coord-label">b</div>
        <div class="coord-label">c</div>
        <div class="coord-label">d</div>
        <div class="coord-label">e</div>
        <div class="coord-label">f</div>
        <div class="coord-label">g</div>
        <div class="coord-label">h</div>
      </div>

    </div>

    <div id="sidebar">

      <div class="panel">
        <h3>Players</h3>

        <div class="player-row">
          <div class="pdot red"></div>
          <div class="pname">Red</div>
          <div class="timer">5:00</div>
        </div>

        <div class="player-row">
          <div class="pdot blk"></div>
          <div class="pname">Black</div>
          <div class="timer">5:00</div>
        </div>
      </div>

      <div class="panel">
        <h3>Game Mode</h3>

        <div class="btn-group">
          <button class="btn active">vs AI</button>
          <button class="btn">2P</button>
        </div>
      </div>

      <div class="panel">
        <h3>Status</h3>
        <div>Your turn</div>
      </div>

      <div class="panel">
        <h3>History</h3>
        <div id="history"></div>
      </div>

    </div>

  </div>

</div>

<script>
const board = document.getElementById('board');

for(let r=0;r<8;r++){

  for(let c=0;c<8;c++){

    const cell = document.createElement('div');

    cell.className =
      'cell ' + ((r+c)%2===0 ? 'lite' : 'dark');

    if((r+c)%2===1 && r<3){
      const p = document.createElement('div');
      p.className='piece blk';
      cell.appendChild(p);
    }

    if((r+c)%2===1 && r>4){
      const p = document.createElement('div');
      p.className='piece red';
      cell.appendChild(p);
    }

    board.appendChild(cell);
  }
}

/* FULLSCREEN */
const fullscreenBtn =
document.getElementById('fullscreenBtn');

fullscreenBtn.addEventListener('click',()=>{

  if(!document.fullscreenElement){

    document.documentElement.requestFullscreen();

  }else{

    document.exitFullscreen();

  }

});
</script>

</body>
</html>
