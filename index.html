<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Royal Checkers · Responsive Fullscreen</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap');

:root{
  --bg-deep:#0d0d1a;
  --bg-panel:#131325;
  --bg-card:#1a1a30;
  --border:#2e2e55;
  --gold:#c9a227;
  --gold-dim:#8a6f1a;
  --cell-dark:#2a3d1e;
  --cell-lite:#e8d5b0;
  --text:#ddd;
  --text-dim:#888;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg-deep);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:10px;
}

/* =========================
   APP
========================= */

#app{
  width:min(1400px,100%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* =========================
   HEADER
========================= */

#header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;

  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:14px;

  padding:12px 16px;
}

#title{
  font-family:'Cinzel',serif;
  font-size:24px;
  color:var(--gold);
  font-weight:700;
  letter-spacing:2px;
}

#title span{
  color:#fff;
  opacity:.5;
  font-size:12px;
}

#hdr-btns{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

/* =========================
   BUTTONS
========================= */

.btn{
  border:1px solid var(--border);
  background:#1c1c33;
  color:var(--text);

  padding:7px 14px;
  border-radius:10px;

  cursor:pointer;

  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;

  transition:.2s;
}

.btn:hover{
  border-color:var(--gold);
  color:var(--gold);
}

.btn.active{
  background:var(--gold);
  color:#111;
  border-color:var(--gold);
}

.btn.sm{
  padding:5px 8px;
  font-size:10px;
}

/* =========================
   SCORES
========================= */

#scores{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.score-card{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  text-align:center;
}

.sc-label{
  font-size:11px;
  color:var(--text-dim);
  margin-bottom:4px;
}

.sc-val{
  font-family:'Cinzel',serif;
  color:var(--gold);
  font-size:22px;
}

/* =========================
   MAIN
========================= */

#main{
  display:flex;
  gap:18px;
  align-items:flex-start;
}

/* =========================
   BOARD AREA
========================= */

#board-container{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

#coord-row-top,
#coord-row-bot{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  width:min(92vw,82vh,820px);
}

.coord-label{
  text-align:center;
  color:var(--gold-dim);
  font-size:12px;
  font-weight:700;
}

#board-outer{
  display:flex;
  align-items:center;
  gap:6px;
}

.coord-col{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.coord-col span{
  width:22px;
  height:calc(min(92vw,82vh,820px)/8);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold-dim);
  font-size:12px;
  font-weight:700;
}

/* =========================
   BOARD
========================= */

#board-wrap{
  position:relative;
}

#board{
  width:min(92vw,82vh,820px);
  height:min(92vw,82vh,820px);

  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);

  border:2px solid var(--gold-dim);
  border-radius:8px;

  overflow:hidden;

  box-shadow:
    0 0 30px rgba(0,0,0,.8),
    0 0 0 1px rgba(201,162,39,.2);
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:pointer;
}

.cell.lite{
  background:var(--cell-lite);
}

.cell.dark{
  background:var(--cell-dark);
}

.cell.dark:hover{
  background:#395226;
}

.cell.sel-cell{
  background:rgba(201,162,39,.5)!important;
}

.cell.move-dot::after{
  content:'';
  width:26%;
  height:26%;
  border-radius:50%;
  background:#2ecc71;
}

.cell.cap-dot{
  background:rgba(231,76,60,.35)!important;
}

/* =========================
   PIECES
========================= */

.piece{
  width:78%;
  height:78%;
  border-radius:50%;

  transition:.15s;
}

.piece:hover{
  transform:scale(1.06);
}

.piece.red{
  background:
  radial-gradient(circle at 35% 35%,#f05545,#b52a1f 70%);
}

.piece.blk{
  background:
  radial-gradient(circle at 35% 35%,#5f5f7e,#222236 70%);
}

.piece.king{
  position:relative;
}

.piece.king::after{
  content:'♛';
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#ffd966;

  font-size:clamp(14px,2vw,28px);
}

/* =========================
   SIDEBAR
========================= */

#sidebar{
  width:260px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.panel{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}

.panel h3{
  color:var(--gold-dim);
  font-size:12px;
  letter-spacing:1px;
  margin-bottom:10px;
}

.player-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  border-radius:10px;
}

.player-row.active{
  background:rgba(201,162,39,.1);
}

.pdot{
  width:18px;
  height:18px;
  border-radius:50%;
}

.pdot.red{
  background:#d63f34;
}

.pdot.blk{
  background:#303050;
}

.pname{
  flex:1;
}

.pcnt{
  color:var(--gold);
  font-weight:700;
}

.timer{
  width:50px;
  text-align:right;
}

#history{
  max-height:200px;
  overflow:auto;
  font-size:12px;
  line-height:1.8;
}

#status-msg{
  font-size:13px;
}

/* =========================
   OVERLAY
========================= */

#overlay{
  position:absolute;
  inset:0;

  background:rgba(0,0,0,.9);

  display:none;
  align-items:center;
  justify-content:center;
}

#overlay-box{
  background:var(--bg-card);
  border:1px solid var(--gold);

  padding:24px;
  border-radius:20px;

  text-align:center;
}

#overlay-box h2{
  color:var(--gold);
  margin-bottom:10px;
}

/* =========================
   FULLSCREEN
========================= */

:fullscreen #app{
  width:100vw;
  height:100vh;
  max-width:none;
}

:fullscreen #board{
  width:min(94vw,94vh);
  height:min(94vw,94vh);
}

:-webkit-full-screen #board{
  width:min(94vw,94vh);
  height:min(94vw,94vh);
}

/* iPhone fallback */

body.fake-fullscreen{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  z-index:9999;
  overflow:auto;
  background:#070710;
}

body.fake-fullscreen #app{
  width:100vw;
  height:100vh;
  max-width:none;
}

body.fake-fullscreen #board{
  width:min(100vw,100vh);
  height:min(100vw,100vh);
}

/* =========================
   TABLET
========================= */

@media(max-width:900px){

  #main{
    flex-direction:column;
    align-items:center;
  }

  #sidebar{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
  }

  #board{
    width:min(96vw,78vh);
    height:min(96vw,78vh);
  }

  #coord-row-top,
  #coord-row-bot{
    width:min(96vw,78vh);
  }

  .coord-col span{
    height:calc(min(96vw,78vh)/8);
  }
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

  body{
    padding:4px;
  }

  #sidebar{
    grid-template-columns:1fr;
  }

  #board{
    width:98vw;
    height:98vw;
  }

  #coord-row-top,
  #coord-row-bot{
    width:98vw;
  }

  .coord-col span{
    height:calc(98vw/8);
    width:16px;
    font-size:10px;
  }

  .coord-label{
    font-size:10px;
  }

  #title{
    font-size:18px;
  }

  .btn{
    font-size:10px;
    padding:5px 8px;
  }
}
</style>
</head>

<body>

<div id="app">

  <div id="header">
    <div id="title">CHECKERS <span>ROYAL</span></div>

    <div id="hdr-btns">
      <button class="btn" id="fullscreenBtn">⛶ FULL</button>
      <button class="btn" onclick="newGame()">NEW</button>
    </div>
  </div>

  <div id="scores">
    <div class="score-card">
      <div class="sc-label">Red Wins</div>
      <div class="sc-val" id="sc-red">0</div>
    </div>

    <div class="score-card">
      <div class="sc-label">Draws</div>
      <div class="sc-val" id="sc-draw">0</div>
    </div>

    <div class="score-card">
      <div class="sc-label">Black Wins</div>
      <div class="sc-val" id="sc-blk">0</div>
    </div>
  </div>

  <div id="main">

    <div id="board-container">

      <div id="coord-row-top">
        <div class="coord-label">a</div>
        <div class="coord-label">b</div>
        <div class="coord-label">c</div>
        <div class="coord-label">d</div>
        <div class="coord-label">e</div>
        <div class="coord-label">f</div>
        <div class="coord-label">g</div>
        <div class="coord-label">h</div>
      </div>

      <div id="board-outer">

        <div class="coord-col" id="cleft"></div>

        <div id="board-wrap">

          <div id="board"></div>

          <div id="overlay">
            <div id="overlay-box">
              <h2 id="ov-title">Game Over</h2>
              <p id="ov-msg"></p>
              <br />
              <button class="btn active" onclick="newGame()">
                Play Again
              </button>
            </div>
          </div>

        </div>

        <div class="coord-col" id="cright"></div>

      </div>

      <div id="coord-row-bot">
        <div class="coord-label">a</div>
        <div class="coord-label">b</div>
        <div class="coord-label">c</div>
        <div class="coord-label">d</div>
        <div class="coord-label">e</div>
        <div class="coord-label">f</div>
        <div class="coord-label">g</div>
        <div class="coord-label">h</div>
      </div>

    </div>

    <div id="sidebar">

      <div class="panel">

        <h3>Players</h3>

        <div class="player-row active">
          <div class="pdot red"></div>
          <div class="pname">Red</div>
          <div class="pcnt" id="cnt-red">12</div>
          <div class="timer">5:00</div>
        </div>

        <div class="player-row">
          <div class="pdot blk"></div>
          <div class="pname">Black</div>
          <div class="pcnt" id="cnt-blk">12</div>
          <div class="timer">5:00</div>
        </div>

      </div>

      <div class="panel">
        <h3>Status</h3>
        <div id="status-msg">Red to move</div>
      </div>

      <div class="panel">
        <h3>Move History</h3>
        <div id="history"></div>
      </div>

    </div>

  </div>

</div>

<script>
/* =========================
   FULLSCREEN
========================= */

function toggleFullscreen(){

  const elem=document.documentElement;

  if(
    !document.fullscreenElement &&
    !document.webkitFullscreenElement
  ){

    if(elem.requestFullscreen){
      elem.requestFullscreen();
    }
    else if(elem.webkitRequestFullscreen){
      elem.webkitRequestFullscreen();
    }
    else{
      document.body.classList.add('fake-fullscreen');
    }

  }else{

    if(document.exitFullscreen){
      document.exitFullscreen();
    }
    else if(document.webkitExitFullscreen){
      document.webkitExitFullscreen();
    }

    document.body.classList.remove('fake-fullscreen');
  }
}

document
.getElementById('fullscreenBtn')
.addEventListener('click',toggleFullscreen);

/* =========================
   CHECKERS
========================= */

const E=0;
const R=1;
const B=2;
const RK=3;
const BK=4;

let board=[];
let turn=R;

function initBoard(){

  board=Array(8)
  .fill()
  .map(()=>Array(8).fill(E));

  for(let r=0;r<3;r++){
    for(let c=0;c<8;c++){
      if((r+c)%2===1){
        board[r][c]=B;
      }
    }
  }

  for(let r=5;r<8;r++){
    for(let c=0;c<8;c++){
      if((r+c)%2===1){
        board[r][c]=R;
      }
    }
  }
}

function isRed(p){
  return p===R||p===RK;
}

function isBlack(p){
  return p===B||p===BK;
}

function isKing(p){
  return p===RK||p===BK;
}

function render(){

  const bd=document.getElementById('board');
  bd.innerHTML='';

  for(let r=0;r<8;r++){

    for(let c=0;c<8;c++){

      const cell=document.createElement('div');

      cell.className=
      'cell '+
      (((r+c)%2===0)?'lite':'dark');

      const p=board[r][c];

      if(p!==E){

        const piece=document.createElement('div');

        piece.className=
        'piece '+
        (isRed(p)?'red':'blk')+
        (isKing(p)?' king':'');

        cell.appendChild(piece);
      }

      bd.appendChild(cell);
    }
  }
}

function buildCoords(){

  const L=document.getElementById('cleft');
  const R=document.getElementById('cright');

  L.innerHTML='';
  R.innerHTML='';

  for(let i=8;i>=1;i--){

    const a=document.createElement('span');
    a.textContent=i;
    L.appendChild(a);

    const b=document.createElement('span');
    b.textContent=i;
    R.appendChild(b);
  }
}

function newGame(){

  initBoard();
  render();
  buildCoords();
}

newGame();
</script>

</body>
</html>
